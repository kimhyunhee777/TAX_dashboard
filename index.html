<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>세법 개정 알림 — TAX_dashboard</title>
<style>
  :root{
    --bg:#F2F4F6;
    --surface:#FFFFFF;
    --surface-alt:#F4F6F8;
    --ink:#191F28;
    --ink-muted:#6B7684;
    --ink-faint:#8B95A1;
    --border:#E5E8EB;
    --accent:#3182F6;
    --accent-soft:#EBF2FE;
    --pos:#00C471;
    --pos-soft:#E8F9F1;
    --neg:#F04452;
    --neg-soft:#FDECEC;
    --news:#7C5CFC;
    --news-soft:#F1EDFE;
    --shadow: 0 2px 6px rgba(25,31,40,0.04), 0 8px 20px -10px rgba(25,31,40,0.08);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0A0C10; --surface:#191F28; --surface-alt:#20272F; --ink:#F2F4F6; --ink-muted:#9AA4B2; --ink-faint:#8B95A1;
      --border:#2A313C; --accent:#4593FC; --accent-soft:#1C2B44;
      --pos:#2ED890; --pos-soft:#122E24; --neg:#FF6B6B; --neg-soft:#2E1A1C;
      --news:#A78BFA; --news-soft:#241E3D;
      --shadow: 0 2px 6px rgba(0,0,0,0.35), 0 8px 20px -10px rgba(0,0,0,0.5);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0A0C10; --surface:#191F28; --surface-alt:#20272F; --ink:#F2F4F6; --ink-muted:#9AA4B2; --ink-faint:#8B95A1;
    --border:#2A313C; --accent:#4593FC; --accent-soft:#1C2B44;
    --pos:#2ED890; --pos-soft:#122E24; --neg:#FF6B6B; --neg-soft:#2E1A1C;
    --news:#A78BFA; --news-soft:#241E3D;
    --shadow: 0 2px 6px rgba(0,0,0,0.35), 0 8px 20px -10px rgba(0,0,0,0.5);
  }
  :root[data-theme="light"]{
    --bg:#F2F4F6; --surface:#FFFFFF; --surface-alt:#F4F6F8; --ink:#191F28; --ink-muted:#6B7684; --ink-faint:#8B95A1;
    --border:#E5E8EB; --accent:#3182F6; --accent-soft:#EBF2FE;
    --pos:#00C471; --pos-soft:#E8F9F1; --neg:#F04452; --neg-soft:#FDECEC;
    --news:#7C5CFC; --news-soft:#F1EDFE;
    --shadow: 0 2px 6px rgba(25,31,40,0.04), 0 8px 20px -10px rgba(25,31,40,0.08);
  }

  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,"Segoe UI",sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;}
  .wrap{max-width:720px; margin:0 auto; padding:56px 24px 72px;}

  header.masthead{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:36px;}
  .eyebrow{
    display:inline-flex; width:fit-content; font-size:12.5px; letter-spacing:-.01em;
    color:var(--accent); font-weight:700; background:var(--accent-soft); padding:5px 12px; border-radius:999px;
  }
  h1{margin:12px 0 0; font-size:clamp(24px,3.4vw,31px); font-weight:800; letter-spacing:-.02em;}
  .subtitle{color:var(--ink-muted); font-size:14.5px; margin-top:6px; font-weight:500;}

  .bell-wrap{position:relative; flex-shrink:0;}
  .bell-btn{
    width:50px; height:50px; border-radius:16px; border:1px solid var(--border);
    background:var(--surface); box-shadow:var(--shadow); cursor:pointer; font-size:21px;
    display:flex; align-items:center; justify-content:center; position:relative;
    transition:transform .12s ease;
  }
  .bell-btn:active{transform:scale(.96);}
  .bell-badge{
    position:absolute; top:-6px; right:-6px; min-width:20px; height:20px; padding:0 5px;
    border-radius:999px; background:var(--neg); color:#fff; font-size:11.5px; font-weight:800;
    display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 2px var(--bg);
  }
  .bell-badge.hidden{display:none;}

  .toolbar{display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap;}
  .toolbar label{font-size:12.5px; font-weight:700; color:var(--ink-muted);}
  select{
    padding:10px 14px; font-size:14px; font-weight:600; border-radius:12px;
    border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer;
  }
  .btn-ghost{
    padding:10px 14px; font-size:13px; font-weight:700; border-radius:12px;
    border:1px solid var(--border); background:var(--surface); color:var(--ink-muted); cursor:pointer;
    transition:border-color .12s ease, color .12s ease;
  }
  .btn-ghost:hover{border-color:var(--accent); color:var(--accent);}

  .panel{display:flex; flex-direction:column; gap:12px;}

  .section-block{margin-bottom:28px;}
  .section-header{
    display:flex; align-items:center; gap:8px; margin-bottom:14px; cursor:pointer;
    -webkit-user-select:none; user-select:none;
  }
  .section-header h2{font-size:15px; font-weight:800; margin:0; letter-spacing:-.01em;}
  .section-dot{width:10px; height:10px; border-radius:999px; flex-shrink:0;}
  .section-dot.law{background:var(--accent);}
  .section-dot.prec{background:var(--pos);}
  .section-dot.news{background:var(--news);}
  .section-count{
    font-size:12px; font-weight:700; color:var(--ink-muted); background:var(--surface-alt);
    padding:2px 9px; border-radius:999px;
  }
  .section-chevron{
    margin-left:auto; font-size:12px; color:var(--ink-faint); transition:transform .15s ease;
  }
  .section-chevron.open{transform:rotate(90deg);}
  .section-cards.collapsed{display:none;}

  .alert-card{
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    box-shadow:var(--shadow); padding:20px 22px; cursor:pointer; transition:border-color .12s ease;
  }
  .alert-card:hover{border-color:var(--accent);}
  .alert-card .row{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
  .alert-card .label-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .alert-card .label{font-size:16px; font-weight:800; letter-spacing:-.01em;}
  .law-pill{
    font-size:11.5px; font-weight:700; color:var(--accent); background:var(--accent-soft);
    padding:3px 9px; border-radius:999px; white-space:nowrap;
  }
  .prec-pill{
    font-size:11.5px; font-weight:700; color:var(--pos); background:var(--pos-soft);
    padding:3px 9px; border-radius:999px; white-space:nowrap;
  }
  .news-pill{
    font-size:11.5px; font-weight:700; color:var(--news); background:var(--news-soft);
    padding:3px 9px; border-radius:999px; white-space:nowrap;
  }
  .alert-card .date{font-size:12px; color:var(--ink-faint); font-weight:600; white-space:nowrap; margin-top:2px;}
  .unread-dot{width:8px; height:8px; border-radius:999px; background:var(--accent); flex-shrink:0; margin-top:6px;}
  .alert-card .preview{font-size:13.5px; color:var(--ink-muted); margin-top:10px; line-height:1.55;}

  .detail{display:none; margin-top:16px; padding-top:16px; border-top:1px solid var(--border);}
  .detail.open{display:block;}
  .section-label{margin:0 0 10px; font-size:12.5px; font-weight:800; color:var(--ink-muted); letter-spacing:-.01em;}

  .summary-callout{
    background:var(--accent-soft); border-radius:14px; padding:14px 16px;
    font-size:14px; font-weight:600; line-height:1.6; margin-bottom:18px; color:var(--ink);
  }

  .diff-wrap{display:flex; flex-direction:column; gap:12px; margin-bottom:16px;}
  .diff-panel{background:var(--surface-alt); border-radius:14px; padding:14px 16px;}
  .diff-panel-head{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .diff-dot{width:8px; height:8px; border-radius:999px; flex-shrink:0;}
  .diff-dot.before{background:var(--neg);}
  .diff-dot.after{background:var(--pos);}
  .diff-panel-title{font-size:12.5px; font-weight:800; color:var(--ink-muted);}
  .diff-body{max-height:240px; overflow-y:auto; font-size:13px; line-height:1.65;}
  .diff-line{padding:2px 8px; border-radius:6px; white-space:pre-wrap; word-break:break-word;}
  .diff-line.same{color:var(--ink-muted);}
  .diff-line.removed{background:var(--neg-soft); color:var(--ink); border-left:3px solid var(--neg); padding-left:9px;}
  .diff-line.added{background:var(--pos-soft); color:var(--ink); border-left:3px solid var(--pos); padding-left:9px;}
  .diff-line.modified{color:var(--ink-muted);}
  .word-removed{
    background:var(--neg-soft); color:var(--neg); font-weight:800; text-decoration:line-through;
    border-radius:4px; padding:0 2px;
  }
  .word-added{
    background:var(--pos-soft); color:var(--pos); font-weight:800;
    border-radius:4px; padding:0 2px;
  }
  .diff-collapsed{font-size:11.5px; color:var(--ink-faint); font-weight:700; text-align:center; padding:6px 0;}

  .detail a{font-size:13px; font-weight:700; color:var(--accent); text-decoration:none;}
  .detail a:hover{text-decoration:underline;}

  .meta-list{
    display:flex; flex-direction:column; gap:8px; background:var(--surface-alt); border-radius:14px;
    padding:14px 16px; font-size:13px; margin-bottom:16px;
  }
  .meta-list .meta-row{display:flex; justify-content:space-between; gap:12px; color:var(--ink-muted);}
  .meta-list .meta-row b{color:var(--ink); font-weight:700;}

  .empty{
    background:var(--surface); border:1px dashed var(--border); border-radius:20px;
    padding:36px; text-align:center; color:var(--ink-muted); font-size:14px;
  }

</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div>
      <span class="eyebrow">TAX_dashboard</span>
      <h1>세법 개정 알림</h1>
      <p class="subtitle">등록된 조문의 개정이나 관련 새 판례가 감지되면 여기에 표시됩니다.</p>
    </div>
    <div class="bell-wrap">
      <button class="bell-btn" id="bellBtn" aria-label="개정 알림 열기">
        🔔
        <span class="bell-badge hidden" id="bellBadge">0</span>
      </button>
    </div>
  </header>

  <div class="toolbar">
    <label for="clientSelect">업종</label>
    <select id="clientSelect">
      <option value="">전체 보기</option>
    </select>
    <button class="btn-ghost" id="shareBtn" type="button">🔗 공유 링크 복사</button>
  </div>

  <div class="panel" id="panel">
    <div class="empty" id="emptyState">불러오는 중...</div>
  </div>
</div>

<script>
(function(){
  var READ_KEY = 'txd_read_alert_ids';
  var params = new URLSearchParams(location.search);
  var presetClient = params.get('industry') || params.get('client') || '';

  var alerts = [];
  var clients = [];
  var sectionCollapsed = { amendment: true, precedent: true, news: true };

  function getReadIds(){
    try { return new Set(JSON.parse(localStorage.getItem(READ_KEY) || '[]')); }
    catch(e){ return new Set(); }
  }
  function markRead(id){
    var read = getReadIds();
    read.add(id);
    localStorage.setItem(READ_KEY, JSON.stringify(Array.from(read)));
  }

  function fmtDate(iso){
    if(!iso) return '';
    return iso.slice(0,10);
  }

  function displayDate(a){
    if(a.type === 'precedent'){
      return (a.judgmentDate || '').replace(/\./g, '-').replace(/-$/, '');
    }
    if(a.type === 'news'){
      return fmtDate(a.publishedAt) || fmtDate(a.detectedAt);
    }
    return fmtDate(a.detectedAt);
  }

  // ---- 일반화된 LCS diff: 줄 배열에도, 단어 배열에도 그대로 재사용한다 ----
  // compareFn을 넘기면 "같다"는 판정 기준을 바꿀 수 있다 (예: 이력 꼬리표는 무시하고 비교).
  function diffArrays(oldItems, newItems, compareFn){
    compareFn = compareFn || function(x, y){ return x === y; };
    var n = oldItems.length, m = newItems.length;
    var dp = [];
    for(var i=0;i<=n;i++){ dp.push(new Array(m+1).fill(0)); }
    for(i=n-1;i>=0;i--){
      for(var j=m-1;j>=0;j--){
        dp[i][j] = compareFn(oldItems[i], newItems[j]) ? dp[i+1][j+1] + 1 : Math.max(dp[i+1][j], dp[i][j+1]);
      }
    }
    var ops = [];
    i = 0; var k = 0;
    while(i < n && k < m){
      if(compareFn(oldItems[i], newItems[k])){ ops.push({type:'same', text:newItems[k]}); i++; k++; }
      else if(dp[i+1][k] >= dp[i][k+1]){ ops.push({type:'removed', text:oldItems[i]}); i++; }
      else { ops.push({type:'added', text:newItems[k]}); k++; }
    }
    while(i < n){ ops.push({type:'removed', text:oldItems[i]}); i++; }
    while(k < m){ ops.push({type:'added', text:newItems[k]}); k++; }
    return ops;
  }
  var diffLines = diffArrays;

  // <개정 2020.1.1, ...> 같은 이력 꼬리표는 법 조문 본문이 아니라 참고용 기록이라, 이
  // 꼬리표만 다르고 실제 문장은 같은 줄은 "달라졌다"고 보지 않는다.
  function stripAmendmentTags(str){
    return str.replace(/<(개정|신설|전문개정)[^>]*>/g, '').trim();
  }
  function sameIgnoringTags(a, b){
    return stripAmendmentTags(a) === stripAmendmentTags(b);
  }

  // removed/added 줄이 이어지는 구간(hunk) 전체를 모아서, 삭제된 줄 수와 추가된 줄 수가
  // 정확히 같을 때만 순서대로 짝지어 "일부 단어만 바뀐 것"으로 보고 단어 단위 diff를 돌린다.
  // 인접한 것만 무작정 1:1로 짝지으면, 서로 다른 두 문단이 각각 바뀌었을 때 삭제 줄들이
  // 먼저 몰리고 추가 줄들이 나중에 몰리는 경우(전형적인 줄 단위 diff 순서) 엉뚱한 문단끼리
  // 짝지어져 버린다. 줄 수가 안 맞으면 안전하게 통짜 삭제/추가로만 표시한다.
  function pairModifications(ops){
    var result = [];
    var i = 0;
    while(i < ops.length){
      if(ops[i].type !== 'removed' && ops[i].type !== 'added'){
        result.push(ops[i]);
        i++;
        continue;
      }
      var removedBlock = [], addedBlock = [];
      while(i < ops.length && (ops[i].type === 'removed' || ops[i].type === 'added')){
        if(ops[i].type === 'removed') removedBlock.push(ops[i].text);
        else addedBlock.push(ops[i].text);
        i++;
      }
      if(removedBlock.length === addedBlock.length){
        for(var k=0; k<removedBlock.length; k++){
          result.push({type:'modified', oldText: removedBlock[k], newText: addedBlock[k]});
        }
      } else {
        removedBlock.forEach(function(t){ result.push({type:'removed', text:t}); });
        addedBlock.forEach(function(t){ result.push({type:'added', text:t}); });
      }
    }
    return result;
  }

  function tokenizeWords(str){
    return str.split(/(\s+)/).filter(function(s){ return s.length > 0; });
  }

  function collapseContext(ops, context){
    var result = [];
    var i = 0;
    while(i < ops.length){
      if(ops[i].type === 'same'){
        var j = i;
        while(j < ops.length && ops[j].type === 'same') j++;
        var runLen = j - i;
        if(runLen <= context * 2 + 1){
          for(var a=i; a<j; a++) result.push(ops[a]);
        } else {
          for(var b=i; b<i+context; b++) result.push(ops[b]);
          result.push({type:'collapsed', count: runLen - context*2});
          for(var c=j-context; c<j; c++) result.push(ops[c]);
        }
        i = j;
      } else {
        result.push(ops[i]);
        i++;
      }
    }
    return result;
  }

  // 같은 종류(same/removed/added)의 연속된 조각을 하나로 이어붙여서 append한다 —
  // 단어/글자마다 따로 박스가 생기는 대신 바뀐 구간 전체가 하나의 연속된 하이라이트로 보인다.
  function appendMergedRuns(parent, ops, side){
    var filtered = ops.filter(function(o){
      if(side === 'before' && o.type === 'added') return false;
      if(side === 'after' && o.type === 'removed') return false;
      return true;
    });
    var i = 0;
    while(i < filtered.length){
      var type = filtered[i].type;
      var j = i;
      var text = '';
      while(j < filtered.length && filtered[j].type === type){
        text += filtered[j].text;
        j++;
      }
      if(type === 'same'){
        parent.appendChild(document.createTextNode(text));
      } else {
        var span = document.createElement('span');
        span.className = type === 'removed' ? 'word-removed' : 'word-added';
        span.textContent = text;
        parent.appendChild(span);
      }
      i = j;
    }
  }

  // 단어 단위로 먼저 정렬을 잡고(반복되는 짧은 문구가 많은 한국어 법조문에서 글자
  // 단위로 바로 비교하면 LCS가 문서 전체에서 우연히 같은 글자를 짝지어버려 하이라이트가
  // 지저분해진다), 삭제+추가가 맞붙은 "수정된" 단어 구간만 다시 글자 단위로 세밀하게
  // 비교한다. 그래야 "제1호부목" -> "제1호무목"처럼 한 글자만 바뀐 경우 그 글자만 잡힌다.
  function renderInlineModified(container, op, side){
    var line = document.createElement('div');
    line.className = 'diff-line modified';
    var wordOps = diffArrays(tokenizeWords(op.oldText), tokenizeWords(op.newText));

    var i = 0;
    while(i < wordOps.length){
      if(wordOps[i].type === 'same'){
        line.appendChild(document.createTextNode(wordOps[i].text));
        i++;
        continue;
      }
      var oldText = '', newText = '';
      var j = i;
      while(j < wordOps.length && wordOps[j].type !== 'same'){
        if(wordOps[j].type === 'removed') oldText += wordOps[j].text;
        else newText += wordOps[j].text;
        j++;
      }
      if(oldText && newText){
        // 삭제된 구간과 추가된 구간이 모두 있으면 "수정"으로 보고 글자 단위로 다시 비교
        var charOps = diffArrays(oldText.split(''), newText.split(''));
        appendMergedRuns(line, charOps, side);
      } else if(oldText && side === 'before'){
        var removedSpan = document.createElement('span');
        removedSpan.className = 'word-removed';
        removedSpan.textContent = oldText;
        line.appendChild(removedSpan);
      } else if(newText && side === 'after'){
        var addedSpan = document.createElement('span');
        addedSpan.className = 'word-added';
        addedSpan.textContent = newText;
        line.appendChild(addedSpan);
      }
      i = j;
    }
    container.appendChild(line);
  }

  function renderDiffPanel(container, ops, side){
    container.innerHTML = '';
    var keepType = side === 'before' ? 'removed' : 'added';
    var filtered = ops.filter(function(op){ return op.type === 'same' || op.type === keepType || op.type === 'modified'; });
    var collapsed = collapseContext(filtered, 1);
    collapsed.forEach(function(op){
      if(op.type === 'collapsed'){
        var line = document.createElement('div');
        line.className = 'diff-collapsed';
        line.textContent = '⋯ 동일한 내용 ' + op.count + '줄 ⋯';
        container.appendChild(line);
      } else if(op.type === 'modified'){
        renderInlineModified(container, op, side);
      } else {
        var lineEl = document.createElement('div');
        lineEl.className = 'diff-line ' + op.type;
        lineEl.textContent = op.text;
        container.appendChild(lineEl);
      }
    });
  }

  function filteredAlerts(){
    var clientId = document.getElementById('clientSelect').value;
    var sorted = alerts.slice().sort(function(a,b){ return (b.detectedAt||'').localeCompare(a.detectedAt||''); });
    if(!clientId) return sorted;
    var client = clients.find(function(c){ return c.id === clientId; });
    if(!client) return sorted;
    var tagSet = new Set(client.tags || []);
    return sorted.filter(function(a){
      var tags = a.tags || [];
      if(tags.indexOf('전체') !== -1) return true; // 모든 업종에 공통으로 관련된 알림(예: 일반 세법개정 뉴스)
      if(tags.indexOf(clientId) !== -1) return true; // 특정 업종 id로 직접 태깅된 알림(예: 건설업 전용 뉴스)
      return tags.some(function(t){ return tagSet.has(t); });
    });
  }

  function renderBadge(){
    var read = getReadIds();
    var unread = filteredAlerts().filter(function(a){ return !read.has(a.id); }).length;
    var badge = document.getElementById('bellBadge');
    badge.textContent = unread;
    badge.classList.toggle('hidden', unread === 0);
  }

  function renderCard(a, read){
      var card = document.createElement('div');
      card.className = 'alert-card';

      var row = document.createElement('div');
      row.className = 'row';

      var left = document.createElement('div');
      var labelRow = document.createElement('div');
      labelRow.className = 'label-row';
      var label = document.createElement('span');
      label.className = 'label';
      label.textContent = a.label || a.title || '(제목 없음)';
      var pill = document.createElement('span');
      if(a.type === 'precedent'){
        pill.className = 'prec-pill';
        pill.textContent = (a.courtName || a.caseType || '판례');
      } else if(a.type === 'news'){
        pill.className = 'news-pill';
        pill.textContent = a.source || '뉴스';
      } else {
        pill.className = 'law-pill';
        pill.textContent = (a.law || '') + ' 제' + (a.jo || '') + (a.branch ? '의' + a.branch : '') + '조';
      }
      labelRow.appendChild(label);
      labelRow.appendChild(pill);
      left.appendChild(labelRow);

      var right = document.createElement('div');
      right.style.display = 'flex';
      right.style.alignItems = 'flex-start';
      right.style.gap = '8px';
      var date = document.createElement('div');
      date.className = 'date';
      date.textContent = displayDate(a);
      right.appendChild(date);
      if(!read.has(a.id)){
        var dot = document.createElement('div');
        dot.className = 'unread-dot';
        right.appendChild(dot);
      }

      row.appendChild(left);
      row.appendChild(right);

      var preview = document.createElement('div');
      preview.className = 'preview';
      preview.textContent = a.type === 'news' ? (a.topic || '') : (a.plainSummary || '');

      var detail = document.createElement('div');
      detail.className = 'detail';

      if(a.type === 'precedent'){
        var summaryLabel = document.createElement('p');
        summaryLabel.className = 'section-label';
        summaryLabel.textContent = '쉬운 설명';
        var summaryBox = document.createElement('div');
        summaryBox.className = 'summary-callout';
        summaryBox.textContent = a.plainSummary || '';
        detail.appendChild(summaryLabel);
        detail.appendChild(summaryBox);
      }

      var diffRendered = false;
      var beforeBody, afterBody;

      if(a.type === 'precedent'){
        var metaLabel = document.createElement('p');
        metaLabel.className = 'section-label';
        metaLabel.textContent = '사건 정보';
        var meta = document.createElement('div');
        meta.className = 'meta-list';
        [
          ['사건번호', a.caseNumber],
          ['선고일자', a.judgmentDate],
          ['법원/구분', a.courtName || a.caseType],
          ['자료출처', a.sourceName]
        ].forEach(function(pair){
          if(!pair[1]) return;
          var row2 = document.createElement('div');
          row2.className = 'meta-row';
          var b = document.createElement('b');
          b.textContent = pair[1];
          var span = document.createElement('span');
          span.textContent = pair[0];
          row2.appendChild(span);
          row2.appendChild(b);
          meta.appendChild(row2);
        });
        detail.appendChild(metaLabel);
        detail.appendChild(meta);

        if(a.detailUrl){
          var precLink = document.createElement('a');
          precLink.target = '_blank';
          precLink.rel = 'noopener';
          precLink.href = a.detailUrl;
          precLink.textContent = 'law.go.kr에서 판례 보기';
          detail.appendChild(precLink);
        }
      } else if(a.type === 'news'){
        var newsMetaLabel = document.createElement('p');
        newsMetaLabel.className = 'section-label';
        newsMetaLabel.textContent = '기사 정보';
        var newsMeta = document.createElement('div');
        newsMeta.className = 'meta-list';
        [
          ['출처', a.source],
          ['발행일', fmtDate(a.publishedAt)],
          ['검색 주제', a.topic]
        ].forEach(function(pair){
          if(!pair[1]) return;
          var row3 = document.createElement('div');
          row3.className = 'meta-row';
          var b2 = document.createElement('b');
          b2.textContent = pair[1];
          var span2 = document.createElement('span');
          span2.textContent = pair[0];
          row3.appendChild(span2);
          row3.appendChild(b2);
          newsMeta.appendChild(row3);
        });
        detail.appendChild(newsMetaLabel);
        detail.appendChild(newsMeta);

        if(a.articleUrl){
          var newsLink = document.createElement('a');
          newsLink.target = '_blank';
          newsLink.rel = 'noopener';
          newsLink.href = a.articleUrl;
          newsLink.textContent = '기사 원문 보기';
          detail.appendChild(newsLink);
        }
      } else {
        var diffLabel = document.createElement('p');
        diffLabel.className = 'section-label';
        diffLabel.textContent = '무엇이 달라졌나요?';

        var diffWrap = document.createElement('div');
        diffWrap.className = 'diff-wrap';

        var beforePanel = document.createElement('div');
        beforePanel.className = 'diff-panel';
        beforePanel.innerHTML =
          '<div class="diff-panel-head"><span class="diff-dot before"></span><span class="diff-panel-title">변경 전</span></div>' +
          '<div class="diff-body before-body"></div>';

        var afterPanel = document.createElement('div');
        afterPanel.className = 'diff-panel';
        afterPanel.innerHTML =
          '<div class="diff-panel-head"><span class="diff-dot after"></span><span class="diff-panel-title">변경 후</span></div>' +
          '<div class="diff-body after-body"></div>';

        diffWrap.appendChild(beforePanel);
        diffWrap.appendChild(afterPanel);
        beforeBody = beforePanel.querySelector('.before-body');
        afterBody = afterPanel.querySelector('.after-body');

        var lawLink = document.createElement('a');
        lawLink.target = '_blank';
        lawLink.rel = 'noopener';
        lawLink.href = 'https://www.law.go.kr/LSW/lsSc.do?menuId=1&query=' + encodeURIComponent(a.law || '');
        lawLink.textContent = 'law.go.kr에서 원문 보기';

        detail.appendChild(diffLabel);
        detail.appendChild(diffWrap);
        detail.appendChild(lawLink);
      }

      card.appendChild(row);
      card.appendChild(preview);
      card.appendChild(detail);

      card.addEventListener('click', function(){
        detail.classList.toggle('open');
        if(a.type !== 'precedent' && a.type !== 'news' && detail.classList.contains('open') && !diffRendered){
          var ops = pairModifications(diffLines(a.previousText || [], a.originalText || [], sameIgnoringTags));
          renderDiffPanel(beforeBody, ops, 'before');
          renderDiffPanel(afterBody, ops, 'after');
          diffRendered = true;
        }
        if(!read.has(a.id)){
          markRead(a.id);
          renderBadge();
          var dotEl = row.querySelector('.unread-dot');
          if(dotEl) dotEl.remove();
        }
      });

      return card;
  }

  function renderList(){
    var panel = document.getElementById('panel');
    var list = filteredAlerts();
    var read = getReadIds();
    panel.innerHTML = '';

    if(list.length === 0){
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = '표시할 알림이 없습니다.';
      panel.appendChild(empty);
      return;
    }

    var groups = [
      {key: 'amendment', test: function(a){ return a.type !== 'precedent' && a.type !== 'news'; }, title: '📜 법령 개정', dotClass: 'law'},
      {key: 'precedent', test: function(a){ return a.type === 'precedent'; }, title: '⚖️ 판례', dotClass: 'prec'},
      {key: 'news', test: function(a){ return a.type === 'news'; }, title: '📰 뉴스', dotClass: 'news'}
    ];

    groups.forEach(function(g){
      var items = list.filter(g.test);
      if(items.length === 0) return;

      var section = document.createElement('div');
      section.className = 'section-block';

      var header = document.createElement('div');
      header.className = 'section-header';
      var dot = document.createElement('span');
      dot.className = 'section-dot ' + g.dotClass;
      var h2 = document.createElement('h2');
      h2.textContent = g.title;
      var count = document.createElement('span');
      count.className = 'section-count';
      count.textContent = items.length;
      var chevron = document.createElement('span');
      chevron.className = 'section-chevron' + (sectionCollapsed[g.key] ? '' : ' open');
      chevron.textContent = '▶';
      header.appendChild(dot);
      header.appendChild(h2);
      header.appendChild(count);
      header.appendChild(chevron);
      section.appendChild(header);

      var cardsWrap = document.createElement('div');
      cardsWrap.className = 'panel section-cards' + (sectionCollapsed[g.key] ? ' collapsed' : '');
      items.forEach(function(a){
        cardsWrap.appendChild(renderCard(a, read));
      });
      section.appendChild(cardsWrap);

      header.addEventListener('click', function(){
        sectionCollapsed[g.key] = !sectionCollapsed[g.key];
        cardsWrap.classList.toggle('collapsed', sectionCollapsed[g.key]);
        chevron.classList.toggle('open', !sectionCollapsed[g.key]);
      });

      panel.appendChild(section);
    });
  }

  function populateClientSelect(){
    var select = document.getElementById('clientSelect');
    clients.forEach(function(c){
      var opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      select.appendChild(opt);
    });
    if(presetClient){
      select.value = presetClient;
    }
    select.addEventListener('change', function(){
      renderBadge();
      renderList();
    });
  }

  Promise.all([
    fetch('data/alerts.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch('data/precedent_alerts.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch('data/news_alerts.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch('clients.json').then(function(r){ return r.json(); }).catch(function(){ return []; })
  ]).then(function(results){
    alerts = (results[0] || []).concat(results[1] || []).concat(results[2] || []);
    clients = results[3] || [];
    populateClientSelect();
    renderBadge();
    renderList();
  });

  document.getElementById('bellBtn').addEventListener('click', function(){
    document.getElementById('panel').scrollIntoView({behavior:'smooth', block:'start'});
  });

  document.getElementById('shareBtn').addEventListener('click', function(){
    var clientId = document.getElementById('clientSelect').value;
    var url = location.origin + location.pathname + (clientId ? ('?industry=' + encodeURIComponent(clientId)) : '');
    var btn = this;
    var restore = function(){ btn.textContent = '🔗 공유 링크 복사'; };
    navigator.clipboard.writeText(url).then(function(){
      btn.textContent = '✓ 복사됨';
      setTimeout(restore, 1500);
    }).catch(function(){
      window.prompt('아래 링크를 복사하세요', url);
    });
  });
})();
</script>
</body>
</html>
