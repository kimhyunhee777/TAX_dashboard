name: Check tax law amendments, precedents, and news

on:
  schedule:
    - cron: "0 22 * * *"   # 매일 07:00 KST (UTC 22:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run amendment checker
        env:
          LAW_API_OC: ${{ secrets.LAW_API_OC }}
        run: python scripts/check_amendments.py

      - name: Run precedent checker
        env:
          LAW_API_OC: ${{ secrets.LAW_API_OC }}
        run: python scripts/check_precedents.py

      - name: Run news checker
        run: python scripts/check_news.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/alerts.json data/precedent_state.json data/precedent_alerts.json data/news_state.json data/news_alerts.json
          git diff --cached --quiet || git commit -m "chore: update amendment/precedent/news data"
          git push

      - name: Send email digest (skips if SMTP secrets are not set)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
        run: python scripts/send_digest.py
