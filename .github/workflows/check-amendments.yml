name: Check tax law amendments

on:
  schedule:
    - cron: "0 22 * * *"   # 매일 07:00 KST (UTC 22:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run amendment checker
        env:
          LAW_API_OC: ${{ secrets.LAW_API_OC }}
        run: python scripts/check_amendments.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/alerts.json
          git diff --cached --quiet || git commit -m "chore: update amendment data"
          git push
